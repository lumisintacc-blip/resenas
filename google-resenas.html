<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .box {
      text-align: center;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 1.2rem 2rem;
      display: inline-block;
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-bottom: 6px;
    }
    .g { font-size: 19px; font-weight: 700; }
    .g1 { color: #4285F4; }
    .g2 { color: #EA4335; }
    .g3 { color: #FBBC05; }
    .g4 { color: #34A853; }
    .resenas { font-size: 19px; font-weight: 600; color: #111827; }
    .rating-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .num { font-size: 28px; font-weight: 700; color: #111827; }
    .stars { color: #FBBC04; font-size: 24px; letter-spacing: 1px; }
    .count { font-size: 15px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="box">
    <div class="title-row">
      <span class="g">
        <span class="g1">G</span><span class="g2">o</span><span class="g3">o</span><span class="g1">g</span><span class="g4">l</span><span class="g2">e</span>
      </span>
      <span class="resenas">Reseñas</span>
    </div>
    <div class="rating-row">
      <span class="num">5.0</span>
      <span class="stars">★★★★★</span>
      <span class="count">(88)</span>
    </div>
  </div>
</body>
</html>
