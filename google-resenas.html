<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: fit-content; }
    body {
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      height: fit-content;
    }
    .box {
      text-align: center;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 0.7rem 1.5rem 0.6rem;
      width: 100%;
      display: block;
      line-height: 1;
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-bottom: 3px;
    }
    .g {
      font-size: 17px;
      font-weight: 700;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1;
    }
    .g1 { color: #4285F4; }
    .g2 { color: #EA4335; }
    .g3 { color: #FBBC05; }
    .g4 { color: #34A853; }
    .resenas {
      font-size: 17px;
      font-weight: 600;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1;
    }
    .rating-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      line-height: 1;
    }
    .num {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1;
    }
    .stars {
      color: #FBBC04;
      font-size: 20px;
      letter-spacing: 1px;
      line-height: 1;
    }
    .count {
      font-size: 13px;
      color: #6b7280;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="title-row">
      <span class="g">
        <span class="g1">G</span><span class="g2">o</span><span class="g3">o</span><span class="g1">g</span><span class="g4">l</span><span class="g2">e</span>
      </span>
      <span class="resenas">Reseñas</span>
    </div>
    <div class="rating-row">
      <span class="num">5.0</span>
      <span class="stars">★★★★★</span>
      <span class="count">(88)</span>
    </div>
  </div>
</body>
</html>
